name: Build Rubeus

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019   # This image has better legacy .NET Framework support

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable .NET Framework 3.5 (required for older projects)
        shell: powershell
        run: |
          Enable-WindowsOptionalFeature -Online -FeatureName NetFx3 -All -NoRestart

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Rubeus.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild Rubeus.sln /p:Configuration=Release /p:Platform="Any CPU" /m /verbosity:normal

      - name: Upload Artifact (Rubeus.exe)
        uses: actions/upload-artifact@v4
        with:
          name: Rubeus-exe
          path: |
            Rubeus/Rubeus/bin/Release/Rubeus.exe
            Rubeus/bin/Release/Rubeus.exe
          if-no-files-found: warn
