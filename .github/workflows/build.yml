name: Build Rubeus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Framework Targeting Packs (Workaround)
        shell: powershell
        run: |
          # Install reference assemblies via NuGet (bypasses missing developer pack)
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net40 -Version 1.0.3 -OutputDirectory packages

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore
        run: nuget restore Rubeus.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild Rubeus.sln /p:Configuration=Release /p:Platform="Any CPU" /m /verbosity:normal /p:TargetFrameworkVersion=v4.0

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rubeus-exe
          path: |
            **/Rubeus.exe
            **/bin/Release/Rubeus.exe
          if-no-files-found: warn
